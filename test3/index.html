<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <style>
    :root {
      --bg: #0c0c0f;
      --panel: #15161b;
      --line: #23252d;
      --text: #f1f3f7;
      --muted: #8a909c;
      --focus: #d7dbe5;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b0c10;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      width: min(520px, calc(100% - 24px));
      padding: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    input {
      width: 100%;
      min-height: 48px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0f1014;
      color: var(--text);
      padding: 0 14px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: var(--focus);
    }

    button {
      min-height: 48px;
      border-radius: 12px;
      border: 1px solid #2a2d36;
      background: #f1f3f7;
      color: #0d0f14;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      opacity: .7;
      cursor: progress;
    }

    .status {
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
      padding: 4px 2px 0;
    }

    .status.err { color: #ff8f9d; }
    .status.ok { color: #a3e8b8; }
  </style>
</head>
<body>
  <main class="card">
    <form id="form" class="stack">
      <input id="url" type="url" placeholder="Ссылка" required>
      <input id="pin" type="password" placeholder="PIN" inputmode="numeric" required>
      <button id="submit" type="submit">Скачать</button>
      <div id="status" class="status"></div>
    </form>
  </main>

  <script>
    const BACKEND_BASE = 'http://157.22.176.127:8011';
    const form = document.getElementById('form');
    const urlInput = document.getElementById('url');
    const pinInput = document.getElementById('pin');
    const submitBtn = document.getElementById('submit');
    const statusEl = document.getElementById('status');

    function setStatus(text = '', kind = '') {
      statusEl.textContent = text;
      statusEl.className = 'status' + (kind ? ' ' + kind : '');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const url = urlInput.value.trim();
      const pin = pinInput.value.trim();

      if (!url || !pin) {
        setStatus('Заполни поля.', 'err');
        return;
      }

      submitBtn.disabled = true;
      setStatus('Обработка...');

      try {
        const response = await fetch(`${BACKEND_BASE}/download?url=${encodeURIComponent(url)}&pin=${encodeURIComponent(pin)}`);

        if (!response.ok) {
          let message = 'Ошибка.';
          try {
            const data = await response.json();
            if (data && data.detail) message = data.detail;
          } catch {}
          throw new Error(message);
        }

        const blob = await response.blob();
        const disposition = response.headers.get('Content-Disposition') || '';
        const fileNameMatch = disposition.match(/filename\*?=(?:UTF-8''|"?)([^";]+)/i);
        const fileName = fileNameMatch ? decodeURIComponent(fileNameMatch[1].replace(/"/g, '')) : 'file.bin';

        const objectUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = objectUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(objectUrl);

        setStatus('Готово.', 'ok');
      } catch (error) {
        setStatus(error.message || 'Ошибка.', 'err');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
